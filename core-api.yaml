            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      tags:
      - Cases
      summary: Open case
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                audit:
                  $ref: '#/components/schemas/AuditDetail'
                disclosure:
                  $ref: '#/components/schemas/DisclosureDetail'
                escalation:
                  $ref: '#/components/schemas/EscalationDetail'
                evidence:
                  type: array
                  items: &id026
                    $ref: '#/components/schemas/Document'
                owner_id:
                  type: string
                summary:
                  type: string
                  example: Possible structuring pattern on acct 0012
                tasks:
                  type: array
                  items: &id027
                    type: string
                type:
                  type: string
                  enum: &id028
                  - investigation
                  - sar_decision
                  - escalation
                  - audit_engagement
