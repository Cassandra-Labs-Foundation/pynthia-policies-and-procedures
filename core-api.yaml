openapi: 3.0.3
info:
  title: Cassandra Banking Core API
  version: 3.0.0
  x-note: Specific domain codes (e.g. sar.filed, vendor_review) live as `subject` values in vocab-migration.json, not as distinct
    vocabulary elements.
paths:
  /cases:
    get:
      operationId: get_cases
      x-operation-id: list_cases
      responses:
        '200':
          description: A page of Case objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id001
                      $ref: '#/components/schemas/Case'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
      - Cases
      summary: List cases
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/After'
    post:
      operationId: post_cases
      x-operation-id: open_case
      responses:
        '201':
          description: The created Case.
          content:
            application/json:
              schema: *id001
        '409':
          description: Idempotency-Key reused with different args (D6).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      tags:
      - Cases
      summary: Open case
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                audit:
                  $ref: '#/components/schemas/AuditDetail'
                disclosure:
                  $ref: '#/components/schemas/DisclosureDetail'
                escalation:
                  $ref: '#/components/schemas/EscalationDetail'
                evidence:
                  type: array
                  items: &id068
                    $ref: '#/components/schemas/Document'
                  x-bound-controls:
                  - BSA-06
                owner_id:
                  type: string
                  x-bound-controls:
                  - BSA-06
                summary:
                  type: string
                  x-bound-controls:
                  - BSA-06
                  example: Possible structuring pattern on acct 0012
                tasks:
                  type: array
                  items: &id069
                    type: string
                type:
                  type: string
                  enum: &id070
                  - investigation
                  - sar_decision
                  - escalation
                  - audit_engagement
                  - sar_disclosure_request
                  example: investigation
              required:
              - type
              - owner_id
  /cases/{id}:
    get:
      operationId: get_cases_id
      x-operation-id: get_case
      responses:
        '200':
          description: The requested Case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '404':
          description: Case not found.
          content:
            application/json:
