components:
  schemas:
    Account:
      type: object
      x-kind: banking-core
      x-states:
      - open
      - frozen
      - closed
      properties:
        account_type:
          type: string
        balance:
          type: integer
        blnk_ledger_id:
          type: string
        created_at:
          type: string
          format: date-time
        id:
          type: string
        lock_type:
          type: string
        maturity_date:
          type: string
          format: date-time
        maturity_disposition:
          type: string
        opening_channel:
          type: string
        status:
          type: string
    AchTransfer:
      type: object
      x-kind: banking-core
      x-states:
      - pending_approval
      - submitted
      - settled
      - returned
      - rejected
      - canceled
      properties:
        amount:
          type: integer
        control_results:
          type: object
        counterparty:
          type: string
        status:
          type: string
        window:
          type: string
    Address:
      type: object
      x-kind: banking-core
      properties:
        city:
          type: string
        country:
          type: string
        line1:
          type: string
        line2:
          type: string
        ncoa_candidate:
          type: string
        postal_code:
          type: string
        region:
          type: string
    Beneficiary:
      type: object
      x-kind: banking-core
      properties:
        account_number:
          type: string
        bank_name:
          type: string
        name:
          type: string
        routing_number:
          type: string
    BookkeepingEntry:
      type: object
      x-kind: banking-core
      properties:
        account_code_5300:
          type: string
        amount:
          type: integer
        id:
          type: string
        locked_amount:
          type: integer
        running_balance:
          type: string
        schedule_a_code:
          type: string
    BsaAlert:
      type: object
      x-kind: banking-core
      properties:
        alert_type:
          type: string
        details:
          type: string
        entity_hash:
          type: string
        event_id:
          type: string
        id:
          type: string
        requires_lookback:
          type: string
        status:
          type: string
        triage_timer:
          type: string
    Card:
      type: object
      x-kind: banking-core
      properties:
        id:
          type: string
        reissue_request:
          type: string
        request_during_address_hold:
          type: string
        spend_controls:
          type: string
        status:
          type: string
    CardAuthorization:
      type: object
      x-kind: banking-core
      properties:
        amount:
          type: integer
        control_results:
          type: object
        decline_reason:
          type: string
        id:
          type: string
        merchant:
          type: string
        status:
          type: string
    CddProfile:
      type: object
      x-kind: banking-core
      properties:
        control_person:
          type: string
        expected_activity:
          type: string
        industry_code:
          type: string
        risk_tier:
          type: string
          enum:
          - low
          - moderate
          - high
        source_of_funds:
          type: string
    Counterparty:
      type: object
      x-kind: banking-core
      properties:
        name:
          type: string
        routing_number:
          type: string
    Entity:
      type: object
      x-kind: banking-core
      x-states:
      - pending
      - active
      - disabled
      - archived
      properties:
        address:
          type: string
        address_change:
          type: string
        address_new:
          type: string
        address_previous:
          type: string
        contact:
          type: string
        contact_preference:
          type: string
        date_of_birth:
          type: string
        disabled:
          type: string
        email:
          type: string
        esign_consent:
          type: string
        id:
          type: string
        jurisdiction:
          type: string
        name:
          type: string
        reg_e_opt_in:
          type: string
        status:
          type: string
          enum:
          - pending
          - active
          - disabled
          - archived
        tin:
          type: string
        type:
          type: string
    Event:
      type: object
      x-kind: banking-core
      properties:
        code:
          type: string
        created_at:
          type: string
          format: date-time
        data:
          type: string
        entity_hash:
          type: string
        id:
          type: string
        payload:
          type: object
        previous_data:
          type: object
        resource_id:
          type: string
        type:
          type: string
