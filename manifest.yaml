# Manifest of active policies.
# Only policies listed here (with enabled: true) will be regenerated by the
# "regenerate-policies" scheduled task.
#
# Each entry:
#   folder:   subdirectory name under the repo root
#   slug:     filename stem for the generated output (e.g. "fair-lending" -> fair-lending.md)
#   enabled:  true/false  (false pauses this policy without deleting its config)
#   notes:    optional free-text for humans
#
# To add a new policy, create a folder with a prompt.md (and optional
# references/), then append an entry here.

policies:
