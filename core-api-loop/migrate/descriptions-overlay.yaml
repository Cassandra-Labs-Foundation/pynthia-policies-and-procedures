# descriptions-overlay.yaml — one-line descriptions for the real resources (the Data Model "nouns").
#
# These become the page summaries on GitBook's per-schema model pages. Authored from standard
# banking / BSA-AML meaning + architecture-decisions.md; reviewable source of truth. Only the real
# resources (x-kind domain/banking-core/primitive) are here — the flat vocabulary schemas are
# control-demand registries, not modelled API objects. Applied by author_descriptions.py.

banking-core:
  Account: "A ledger account holding a balance. Lifecycle open↔frozen→closed (Decision 7); carries lock_type and dormancy state."
  AccountNumber: "A routing/account-number pair issued against an Account — 1:Many (Decision 2). Used for FBO attribution and external addressing (Decision 20)."
  AchTransfer: "An ACH credit or debit transfer. Lifecycle pending_approval→submitted→settled, with return/rejection handling."
  WireTransfer: "A domestic wire transfer. Lifecycle pending_approval→submitted→completed, with return-request handling."
  Transfer: "An on-us book transfer between internal accounts (Decision 8). External rails use AchTransfer / WireTransfer."
  Card: "A payment card issued against an account."
  CardAuthorization: "A card authorization request and its decision."
  Entity: "A legal person or organization (person, business, trust, or joint) that owns accounts."
  Address: "A postal address."
  Beneficiary: "The receiving party of a wire or transfer."
  Originator: "The sending party of a transfer."
  Counterparty: "The other party to a transfer."
  Party: "A party to a transfer — originator, beneficiary, or counterparty."
  BookkeepingEntry: "A double-entry ledger posting."
  BsaAlert: "A Bank Secrecy Act transaction-monitoring alert."
  CddProfile: "Customer Due Diligence profile for an entity — risk tier, expected activity, source of funds."
  Event: "An immutable, append-only domain event (Decision 4)."
  FboPosition: "For-Benefit-Of position and balance for an aggregator instance (Decision 19)."
  InboundPayment: "An inbound payment routed to an instance."
  OfacResult: "The result of an OFAC sanctions screening."
  PepStatus: "Politically Exposed Person screening status."
  ProviderResult: "A result returned by an external provider or vendor."
  User: "An operator or staff user of the system."
  Verification: "An identity / KYC verification record."

domain:
  Applicant: "An applicant on a loan application."
  AuditDetail: "Audit engagement detail."
  BoardPack: "A board reporting package."
  CmirData: "Report of International Transportation of Currency or Monetary Instruments (CMIR) data."
  CtrData: "Currency Transaction Report (CTR) data."
  Curriculum: "A staff training curriculum."
  Decision: "A recorded decision (e.g., a credit decision)."
  DisclosureDetail: "Consumer disclosure detail."
  EddFile: "Enhanced Due Diligence file for higher-risk entities."
  EscalationDetail: "An escalation record."
  FbarData: "Report of Foreign Bank and Financial Accounts (FBAR) data."
  Fincen314aData: "FinCEN 314(a) information-request data."
  Incident: "An operational or security incident and its response."
  Loan: "A booked loan on the ledger."
  LoanApplication: "A credit application and its decisioning."
  LoanParty: "A party on a loan — borrower, co-borrower, or guarantor."
  MiCentralLog: "Mortgage-insurance central log."
  OfacControlContext: "Context for an OFAC control evaluation."
  OfacReportData: "OFAC blocked/rejected-transaction reporting data."
  PolicyDoc: "A governance policy document."
  Prequal: "A loan prequalification."
  RetentionSpec: "A records-retention specification."
  RiskCatalogEntry: "An entry in the enterprise risk catalog."
  SarData: "Suspicious Activity Report (SAR) data."
  TrainingDetail: "A staff training record."
  VendorAlert: "A third-party / vendor risk alert."
  VendorReview: "A third-party / vendor risk review."

primitive:
  Case: "An investigation or work case."
  ControlResult: "The recorded result of a control execution."
  Document: "A stored document or artifact."
  Filing: "A regulatory filing and its lifecycle (submit→acknowledge)."
  LegalHold: "A legal hold on records, with release handling."
  Task: "A unit of compliance or operational work. `type` is the generic verb; `subject` carries the domain."
