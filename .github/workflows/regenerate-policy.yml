name: Regenerate policy on prompt change

# Fires whenever any policy's prompt.md changes. The `detect` job lists the
# enabled, changed policies; the `regenerate` job fans out one runner PER
# policy (matrix) so they regenerate in parallel. Each runner prepares its
# composite prompt, regenerates the structured policy ({slug}.md) via the raw
# Anthropic API, then opens its own PR.

on:
  push:
    paths:
      - "**/prompt.md"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Space-separated policy slugs to regenerate (folder names). Leave blank to no-op."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Detect which enabled policies changed -> emit a JSON array for the matrix.
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.detect.outputs.slugs }}   # JSON array, e.g. ["cash","audit"]
      any: ${{ steps.detect.outputs.any }}        # "true" | "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine changed policy slugs
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            slugs="${{ github.event.inputs.slugs }}"
          else
            before="${{ github.event.before }}"
            # New branch / unknown base -> diff against parent commit.
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
            fi
            changed="$(git diff --name-only "$before" "${{ github.sha }}" -- '**/prompt.md' || true)"
            # slug = name of the folder directly containing prompt.md
            slugs="$(echo "$changed" | sed -n 's#\(.*\)/prompt.md$#\1#p' | xargs -n1 basename 2>/dev/null | sort -u | tr '\n' ' ' || true)"
          fi
          slugs="$(echo "$slugs" | xargs || true)"   # trim

          # Gate against manifest.yaml: only regenerate policies marked
          # enabled: true. Paused (enabled: false) or unlisted folders are
          # skipped even if their prompt.md changed. awk parse -> no pip dep.
          enabled="$(awk '
            /^[[:space:]]*-[[:space:]]*folder:/ {f=$NF}
            /^[[:space:]]*enabled:[[:space:]]*true/ {print f}
          ' manifest.yaml | tr "\n" " ")"
          kept=""
          for s in $slugs; do
            case " $enabled " in
              *" $s "*) kept="$kept $s" ;;
              *) echo "Skip $s — disabled or absent in manifest." ;;
            esac
          done
          slugs="$(echo "$kept" | xargs || true)"

          if [ -z "$slugs" ]; then
            echo "slugs=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "No enabled policy changed -> nothing to regenerate."
          else
            json="$(printf '%s\n' $slugs | jq -R . | jq -sc .)"
            echo "slugs=$json" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "Will regenerate (parallel): $json"
          fi

  # ---------------------------------------------------------------------------
  # 2. Regenerate each policy in parallel — one matrix job per slug.
  # ---------------------------------------------------------------------------
  regenerate:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one policy failing must not cancel the others
      max-parallel: 6    # cap concurrent runners (raise/lower to taste)
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.slugs) }}
    concurrency:
      # Serialize repeat runs for the same policy; different policies run free.
      group: regen-${{ matrix.slug }}
      cancel-in-progress: false
    env:
      # Never write .pyc — importing policy-prep would otherwise drop a
      # __pycache__/*.pyc into the tree and each parallel PR would carry a
      # different one, causing merge conflicts.
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect reference-conversion needs
        id: conv
        shell: bash
        run: |
          set -euo pipefail
          # A reference source needs (re)conversion only if its committed .md
          # sidecar is missing or its hash is stale. On a normal prompt.md run
          # references/ is untouched -> every sidecar fresh -> nothing to install.
          stale() {  # stale <ext> -> echoes 1 if any matching source needs conversion
            local ext="$1"
            for f in "${{ matrix.slug }}"/references/*."$ext"; do
              [ -e "$f" ] || continue
              local sc="$f.md"
              [ -f "$sc" ] || { echo 1; return; }
              local rec cur
              rec="$(sed -n '1{s/.*source-sha256="\([0-9a-f]\{64\}\)".*/\1/p;}' "$sc")"
              cur="$(sha256sum "$f" | cut -d' ' -f1)"
              [ "$rec" = "$cur" ] || { echo 1; return; }
            done
            echo 0
          }
          pdf="$(stale pdf)"; docx="$(stale docx)"; doc="$(stale doc)"
          echo "pdf=$pdf"   >> "$GITHUB_OUTPUT"   # poppler (pdftotext)
          echo "docx=$docx" >> "$GITHUB_OUTPUT"   # mammoth
          echo "doc=$doc"   >> "$GITHUB_OUTPUT"   # libreoffice + mammoth
          if [ "$pdf$docx$doc" = "000" ]; then
            echo "any=0" >> "$GITHUB_OUTPUT"
            echo "All reference sidecars fresh -> no conversion tools needed."
          else
            echo "any=1" >> "$GITHUB_OUTPUT"
            echo "Cache-miss: pdf=$pdf docx=$docx doc=$doc -> installing only what's needed."
          fi

      - name: Install conversion tools (only on a reference cache-miss)
        if: steps.conv.outputs.any == '1'
        shell: bash
        run: |
          set -euo pipefail
          # Install only the missing binaries for the extensions that changed.
          # command -v guards skip apt entirely if the runner already ships them
          # (ubuntu-latest often does), and we only pay apt-get update when an
          # apt package is genuinely required.
          pkgs=""
          [ "${{ steps.conv.outputs.pdf }}" = "1" ] && ! command -v pdftotext >/dev/null && pkgs="$pkgs poppler-utils"
          [ "${{ steps.conv.outputs.doc }}" = "1" ] && ! command -v soffice    >/dev/null && pkgs="$pkgs libreoffice-writer"
          if [ -n "$pkgs" ]; then
            # ForceIPv4 + bounded retries/timeout: the azure.archive.ubuntu.com
            # mirror's IPv6 path frequently stalls apt for minutes on GitHub
            # runners (the repeated "Ign:" lines). Pin IPv4 + cap retries so a
            # flaky mirror can't hang the job; --no-install-recommends trims size.
            APT_OPTS="-o Acquire::ForceIPv4=true -o Acquire::Retries=3 -o Acquire::http::Timeout=20"
            sudo apt-get $APT_OPTS update
            sudo apt-get $APT_OPTS install -y --no-install-recommends $pkgs
          fi
          # mammoth handles .docx and the .doc->.docx output; pip, no apt.
          if [ "${{ steps.conv.outputs.docx }}" = "1" ] || [ "${{ steps.conv.outputs.doc }}" = "1" ]; then
            python3 -m pip install mammoth
          fi

      - name: Install Anthropic SDK
        shell: bash
        run: python3 -m pip install anthropic

      - name: Regenerate policy (raw Anthropic API)
        shell: bash
        env:
          # Direct Anthropic API (pay-per-token) for full throughput + prompt
          # caching on the shared meta-prompt.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          # Reuses policy-prep in-process for the optimized, content-hashed
          # document reading, then makes one cached API call (structured policy)
          # and writes this policy's own <slug>.status.md. Bump to
          # claude-opus-4-8 for max quality.
          python3 scripts/regenerate_policy.py "${{ matrix.slug }}" \
            --model claude-sonnet-4-6

      - name: Open pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "policy: regenerate ${{ matrix.slug }} from prompt.md change"
          branch: regen/${{ matrix.slug }}-${{ github.run_id }}
          base: ${{ github.ref_name }}
          # Commit ONLY this policy's outputs: the generated policy and any
          # refreshed reference sidecars. Scoping per-slug means parallel PRs
          # never touch a shared file (STATUS.md, __pycache__, etc.) and so
          # cannot conflict with each other.
          add-paths: |
            ${{ matrix.slug }}/${{ matrix.slug }}.md
            ${{ matrix.slug }}/${{ matrix.slug }}.status.md
            ${{ matrix.slug }}/references/**
          title: "Regenerate policy: ${{ matrix.slug }}"
          body: |
            Automated regeneration triggered by a change to `${{ matrix.slug }}/prompt.md`.

            `${{ matrix.slug }}/${{ matrix.slug }}.md` was rebuilt from the current
            `prompt.md` + `references/` via the policy-prep pipeline and the meta-prompt
            (raw Anthropic API, prompt-cached).

            Review the diff before merging — these are regulator-facing compliance documents.
          delete-branch: true
