name: Regenerate policy on prompt change

# Fires whenever any policy's prompt.md changes. For each changed prompt,
# runs the deterministic prep (policy-prep) then has Claude regenerate the
# structured policy ({slug}.md) and its narrative sibling ({slug}-narrative.md),
# and opens a PR with the result for human review.

on:
  push:
    paths:
      - "**/prompt.md"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Space-separated policy slugs to regenerate (folder names). Leave blank to no-op."
        required: false
        default: ""

concurrency:
  group: regenerate-policy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed policy slugs
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            slugs="${{ github.event.inputs.slugs }}"
          else
            before="${{ github.event.before }}"
            # New branch / unknown base -> diff against parent commit.
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
            fi
            changed="$(git diff --name-only "$before" "${{ github.sha }}" -- '**/prompt.md' || true)"
            # slug = name of the folder directly containing prompt.md
            slugs="$(echo "$changed" | sed -n 's#\(.*\)/prompt.md$#\1#p' | xargs -n1 basename 2>/dev/null | sort -u | tr '\n' ' ' || true)"
          fi
          slugs="$(echo "$slugs" | xargs || true)"   # trim
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"
          if [ -z "$slugs" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No changed prompt.md -> nothing to regenerate."
          else
            echo "count=1" >> "$GITHUB_OUTPUT"
            echo "Will regenerate: $slugs"
          fi

      - name: Set up Python
        if: steps.detect.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install light conversion tools (pdf + docx)
        if: steps.detect.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          # Cheap + fast: poppler (pdftotext) ~5s, mammoth (docx) pip ~3s.
          # These only actually run on a reference cache-miss; install is the floor cost.
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python3 -m pip install --upgrade pip
          python3 -m pip install mammoth

      - name: Decide if libreoffice is needed (.doc conversion)
        id: libre
        if: steps.detect.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          # libreoffice is the only heavy install (~90s) and is needed ONLY to
          # convert a .doc source whose committed .md sidecar is missing or stale.
          # On a normal prompt.md-triggered run nothing under references/ changed,
          # so every sidecar is fresh and we skip the install entirely.
          need=0
          for slug in ${{ steps.detect.outputs.slugs }}; do
            for doc in "$slug"/references/*.doc; do
              [ -e "$doc" ] || continue
              sc="$doc.md"
              if [ ! -f "$sc" ]; then need=1; break; fi
              rec="$(sed -n '1{s/.*source-sha256="\([0-9a-f]\{64\}\)".*/\1/p;}' "$sc")"
              cur="$(sha256sum "$doc" | cut -d' ' -f1)"
              [ "$rec" = "$cur" ] || { need=1; break; }
            done
            [ "$need" = 1 ] && break
          done
          echo "need=$need" >> "$GITHUB_OUTPUT"
          [ "$need" = 1 ] && echo "Stale/new .doc found -> will install libreoffice." \
                          || echo "All .doc sidecars fresh -> skipping libreoffice."

      - name: Install libreoffice (only when a .doc must be converted)
        if: steps.detect.outputs.count != '0' && steps.libre.outputs.need == '1'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y libreoffice-writer

      - name: Prepare composite prompts (policy-prep)
        if: steps.detect.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          for slug in ${{ steps.detect.outputs.slugs }}; do
            echo "::group::prep $slug"
            python3 .skills/policy-prep/scripts/prepare_policy.py "$slug"
            echo "::endgroup::"
          done

      - name: Install Claude Code CLI
        if: steps.detect.outputs.count != '0'
        shell: bash
        run: npm install -g @anthropic-ai/claude-code

      - name: Regenerate policies with Claude
        if: steps.detect.outputs.count != '0'
        shell: bash
        env:
          # Uses your Claude Max subscription quota (no API billing).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          cat > /tmp/regen-prompt.txt <<EOF
          You are running headless in CI to regenerate compliance policies.
          The deterministic prep has already produced a composite prompt for
          each policy at \`.cache/prep/<slug>.composite-prompt.txt\`.

          Regenerate these policies, one at a time: ${{ steps.detect.outputs.slugs }}

          For EACH <slug> in that list:
            1. Read \`.cache/prep/<slug>.composite-prompt.txt\` in full and
               generate the structured policy exactly as that composite prompt
               instructs. Write the result to \`<slug>/<slug>.md\`, overwriting it.
            2. Read \`.skills/narrative/SKILL.md\` and \`.skills/narrative/narrative-prompt.md\`
               and follow them to produce the regulator-facing prose sibling, writing
               it to \`<slug>/<slug>-narrative.md\`, overwriting it. It must describe
               the SAME policy as the structured file.
            3. Update the row for this policy in \`STATUS.md\` (last-regenerated
               timestamp, status, DESIGN_NOTES source, skipped references). Add a
               row if one does not exist. Update the "Last run" header line too.

          Constraints:
            - Do NOT run \`git commit\`, \`git push\`, or open a pull request. Leave
              all changes in the working tree only — a later step opens the PR.
            - Do NOT modify any \`prompt.md\`, \`meta-prompt.md\`, \`manifest.yaml\`,
              or any file under \`references/\`.
            - If a composite prompt file is missing for a slug, skip that slug and
              note it; do not fail the whole run.
          EOF
          # Pin model; bump to claude-opus-4-8 for max quality.
          # --dangerously-skip-permissions: required for autonomous headless tool use
          # in an ephemeral CI runner.
          claude -p "$(cat /tmp/regen-prompt.txt)" \
            --model claude-sonnet-4-6 \
            --dangerously-skip-permissions \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep"

      - name: Open pull request
        if: steps.detect.outputs.count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "policy: regenerate ${{ steps.detect.outputs.slugs }} from prompt.md change"
          branch: regen/${{ github.run_id }}
          base: ${{ github.ref_name }}
          title: "Regenerate policy: ${{ steps.detect.outputs.slugs }}"
          body: |
            Automated regeneration triggered by a change to `prompt.md`.

            **Policies regenerated:** ${{ steps.detect.outputs.slugs }}

            Each policy's structured `{slug}.md` and `{slug}-narrative.md` were
            rebuilt from the current `prompt.md` + `references/` via the
            policy-prep pipeline and the meta-prompt / narrative skills.

            Review the diff before merging — these are regulator-facing
            compliance documents.
          delete-branch: true
