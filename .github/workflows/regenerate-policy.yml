name: Regenerate policy on prompt change

# Fires whenever any policy's prompt.md changes. The `detect` job lists the
# enabled, changed policies; the `regenerate` job fans out one runner PER
# policy (matrix) so they regenerate in parallel. Each runner prepares its
# composite prompt, regenerates the structured policy ({slug}.md) via the raw
# Anthropic API, then opens its own PR.

on:
  push:
    paths:
      - "**/prompt.md"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Space-separated policy slugs to regenerate (folder names). Leave blank to no-op."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Detect which enabled policies changed -> emit a JSON array for the matrix.
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.detect.outputs.slugs }}   # JSON array, e.g. ["cash","audit"]
      any: ${{ steps.detect.outputs.any }}        # "true" | "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine changed policy slugs
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            slugs="${{ github.event.inputs.slugs }}"
          else
            before="${{ github.event.before }}"
            # New branch / unknown base -> diff against parent commit.
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
            fi
            changed="$(git diff --name-only "$before" "${{ github.sha }}" -- '**/prompt.md' || true)"
            # slug = name of the folder directly containing prompt.md
            slugs="$(echo "$changed" | sed -n 's#\(.*\)/prompt.md$#\1#p' | xargs -n1 basename 2>/dev/null | sort -u | tr '\n' ' ' || true)"
          fi
          slugs="$(echo "$slugs" | xargs || true)"   # trim

          # Gate against manifest.yaml: only regenerate policies marked
          # enabled: true. Paused (enabled: false) or unlisted folders are
          # skipped even if their prompt.md changed. awk parse -> no pip dep.
          enabled="$(awk '
            /^[[:space:]]*-[[:space:]]*folder:/ {f=$NF}
            /^[[:space:]]*enabled:[[:space:]]*true/ {print f}
          ' manifest.yaml | tr "\n" " ")"
          kept=""
          for s in $slugs; do
            case " $enabled " in
              *" $s "*) kept="$kept $s" ;;
              *) echo "Skip $s — disabled or absent in manifest." ;;
            esac
          done
          slugs="$(echo "$kept" | xargs || true)"

          if [ -z "$slugs" ]; then
            echo "slugs=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "No enabled policy changed -> nothing to regenerate."
          else
            json="$(printf '%s\n' $slugs | jq -R . | jq -sc .)"
            echo "slugs=$json" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "Will regenerate (parallel): $json"
          fi

  # ---------------------------------------------------------------------------
  # 2. Regenerate each policy in parallel — one matrix job per slug.
  # ---------------------------------------------------------------------------
  regenerate:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one policy failing must not cancel the others
      max-parallel: 6    # cap concurrent runners (raise/lower to taste)
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.slugs) }}
    concurrency:
      # Serialize repeat runs for the same policy; different policies run free.
      group: regen-${{ matrix.slug }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install light conversion tools (pdf + docx)
        shell: bash
        run: |
          set -euo pipefail
          # Cheap + fast: poppler (pdftotext) ~5s, mammoth (docx) pip ~3s.
          # These only actually run on a reference cache-miss; install is the floor cost.
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python3 -m pip install --upgrade pip
          python3 -m pip install mammoth

      - name: Decide if libreoffice is needed (.doc conversion)
        id: libre
        shell: bash
        run: |
          set -euo pipefail
          # libreoffice (~90s install) is needed ONLY to convert a .doc source
          # whose committed .md sidecar is missing or stale. On a normal
          # prompt.md-triggered run references/ is untouched, so we skip it.
          need=0
          for doc in "${{ matrix.slug }}"/references/*.doc; do
            [ -e "$doc" ] || continue
            sc="$doc.md"
            if [ ! -f "$sc" ]; then need=1; break; fi
            rec="$(sed -n '1{s/.*source-sha256="\([0-9a-f]\{64\}\)".*/\1/p;}' "$sc")"
            cur="$(sha256sum "$doc" | cut -d' ' -f1)"
            [ "$rec" = "$cur" ] || { need=1; break; }
          done
          echo "need=$need" >> "$GITHUB_OUTPUT"
          [ "$need" = 1 ] && echo "Stale/new .doc found -> will install libreoffice." \
                          || echo "All .doc sidecars fresh -> skipping libreoffice."

      - name: Install libreoffice (only when a .doc must be converted)
        if: steps.libre.outputs.need == '1'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y libreoffice-writer

      - name: Install Anthropic SDK
        shell: bash
        run: python3 -m pip install anthropic

      - name: Regenerate policy (raw Anthropic API)
        shell: bash
        env:
          # Direct Anthropic API (pay-per-token) for full throughput + prompt
          # caching on the shared meta-prompt.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          # Reuses policy-prep in-process for the optimized, content-hashed
          # document reading, then makes one cached API call (structured policy)
          # and stamps this policy's STATUS.md row. Bump to claude-opus-4-8 for
          # max quality.
          python3 scripts/regenerate_policy.py "${{ matrix.slug }}" \
            --model claude-sonnet-4-6

      - name: Open pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "policy: regenerate ${{ matrix.slug }} from prompt.md change"
          branch: regen/${{ matrix.slug }}-${{ github.run_id }}
          base: ${{ github.ref_name }}
          title: "Regenerate policy: ${{ matrix.slug }}"
          body: |
            Automated regeneration triggered by a change to `${{ matrix.slug }}/prompt.md`.

            `${{ matrix.slug }}/${{ matrix.slug }}.md` was rebuilt from the current
            `prompt.md` + `references/` via the policy-prep pipeline and the meta-prompt
            (raw Anthropic API, prompt-cached).

            Review the diff before merging — these are regulator-facing compliance documents.
          delete-branch: true
