name: Regenerate policy on prompt change

# Fires whenever any policy's prompt.md changes. The `detect` job lists the
# enabled, changed policies; the `regenerate` job fans out one runner PER
# policy (matrix) so they regenerate in parallel. Each runner prepares its
# composite prompt, has Claude regenerate the structured policy ({slug}.md)
# and its narrative sibling ({slug}-narrative.md), then opens its own PR.

on:
  push:
    paths:
      - "**/prompt.md"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Space-separated policy slugs to regenerate (folder names). Leave blank to no-op."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Detect which enabled policies changed -> emit a JSON array for the matrix.
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.detect.outputs.slugs }}   # JSON array, e.g. ["cash","audit"]
      any: ${{ steps.detect.outputs.any }}        # "true" | "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine changed policy slugs
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            slugs="${{ github.event.inputs.slugs }}"
          else
            before="${{ github.event.before }}"
            # New branch / unknown base -> diff against parent commit.
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
            fi
            changed="$(git diff --name-only "$before" "${{ github.sha }}" -- '**/prompt.md' || true)"
            # slug = name of the folder directly containing prompt.md
            slugs="$(echo "$changed" | sed -n 's#\(.*\)/prompt.md$#\1#p' | xargs -n1 basename 2>/dev/null | sort -u | tr '\n' ' ' || true)"
          fi
          slugs="$(echo "$slugs" | xargs || true)"   # trim

          # Gate against manifest.yaml: only regenerate policies marked
          # enabled: true. Paused (enabled: false) or unlisted folders are
          # skipped even if their prompt.md changed. awk parse -> no pip dep.
          enabled="$(awk '
            /^[[:space:]]*-[[:space:]]*folder:/ {f=$NF}
            /^[[:space:]]*enabled:[[:space:]]*true/ {print f}
          ' manifest.yaml | tr "\n" " ")"
          kept=""
          for s in $slugs; do
            case " $enabled " in
              *" $s "*) kept="$kept $s" ;;
              *) echo "Skip $s — disabled or absent in manifest." ;;
            esac
          done
          slugs="$(echo "$kept" | xargs || true)"

          if [ -z "$slugs" ]; then
            echo "slugs=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "No enabled policy changed -> nothing to regenerate."
          else
            json="$(printf '%s\n' $slugs | jq -R . | jq -sc .)"
            echo "slugs=$json" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "Will regenerate (parallel): $json"
          fi

  # ---------------------------------------------------------------------------
  # 2. Regenerate each policy in parallel — one matrix job per slug.
  # ---------------------------------------------------------------------------
  regenerate:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one policy failing must not cancel the others
      max-parallel: 6    # cap concurrent runners (raise/lower to taste)
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.slugs) }}
    concurrency:
      # Serialize repeat runs for the same policy; different policies run free.
      group: regen-${{ matrix.slug }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install light conversion tools (pdf + docx)
        shell: bash
        run: |
          set -euo pipefail
          # Cheap + fast: poppler (pdftotext) ~5s, mammoth (docx) pip ~3s.
          # These only actually run on a reference cache-miss; install is the floor cost.
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python3 -m pip install --upgrade pip
          python3 -m pip install mammoth

      - name: Decide if libreoffice is needed (.doc conversion)
        id: libre
        shell: bash
        run: |
          set -euo pipefail
          # libreoffice (~90s install) is needed ONLY to convert a .doc source
          # whose committed .md sidecar is missing or stale. On a normal
          # prompt.md-triggered run references/ is untouched, so we skip it.
          need=0
          for doc in "${{ matrix.slug }}"/references/*.doc; do
            [ -e "$doc" ] || continue
            sc="$doc.md"
            if [ ! -f "$sc" ]; then need=1; break; fi
            rec="$(sed -n '1{s/.*source-sha256="\([0-9a-f]\{64\}\)".*/\1/p;}' "$sc")"
            cur="$(sha256sum "$doc" | cut -d' ' -f1)"
            [ "$rec" = "$cur" ] || { need=1; break; }
          done
          echo "need=$need" >> "$GITHUB_OUTPUT"
          [ "$need" = 1 ] && echo "Stale/new .doc found -> will install libreoffice." \
                          || echo "All .doc sidecars fresh -> skipping libreoffice."

      - name: Install libreoffice (only when a .doc must be converted)
        if: steps.libre.outputs.need == '1'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y libreoffice-writer

      - name: Prepare composite prompt (policy-prep)
        shell: bash
        run: |
          set -euo pipefail
          python3 .skills/policy-prep/scripts/prepare_policy.py "${{ matrix.slug }}"

      - name: Install Claude Code CLI
        shell: bash
        run: npm install -g @anthropic-ai/claude-code

      - name: Regenerate policy with Claude
        shell: bash
        env:
          # Direct Anthropic API (pay-per-token) for full throughput on large
          # regenerations. --bare requires API-key auth (it skips OAuth).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          SLUG="${{ matrix.slug }}"
          cat > /tmp/regen-prompt.txt <<EOF
          You are running headless in CI to regenerate ONE compliance policy: ${SLUG}.
          The deterministic prep already wrote its composite prompt to
          \`.cache/prep/${SLUG}.composite-prompt.txt\`.

          Do exactly this:
            1. Read \`.cache/prep/${SLUG}.composite-prompt.txt\` in full and generate
               the structured policy exactly as it instructs. Write the result to
               \`${SLUG}/${SLUG}.md\`, overwriting it.
            2. Read \`.skills/narrative/SKILL.md\` and \`.skills/narrative/narrative-prompt.md\`
               and follow them to produce the regulator-facing prose sibling, writing it
               to \`${SLUG}/${SLUG}-narrative.md\`, overwriting it. It must describe the
               SAME policy as the structured file.
            3. In \`STATUS.md\`, update ONLY this policy's row (${SLUG}) — its
               last-regenerated timestamp, status, DESIGN_NOTES source, skipped
               references. Add the row if absent. Do NOT modify the "Last run" /
               "Run totals" header lines or any other policy's row (parallel jobs
               share this file — touching shared lines causes cross-PR conflicts).

          Constraints:
            - Do NOT run \`git commit\`, \`git push\`, or open a pull request. Leave
              all changes in the working tree only — a later step opens the PR.
            - Do NOT modify any \`prompt.md\`, \`meta-prompt.md\`, \`manifest.yaml\`,
              or any file under \`references/\`.
          EOF
          # --bare: skip auto-discovery (hooks/skills/plugins/MCP/memory/CLAUDE.md)
          #   for faster, deterministic startup. We read the narrative skill files
          #   explicitly, so nothing is lost.
          # --permission-mode acceptEdits: grant file read/write/edit only; arbitrary
          #   Bash/network aborts. Pin model; bump to claude-opus-4-8 for max quality.
          claude --bare -p "$(cat /tmp/regen-prompt.txt)" \
            --model claude-sonnet-4-6 \
            --permission-mode acceptEdits

      - name: Open pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "policy: regenerate ${{ matrix.slug }} from prompt.md change"
          branch: regen/${{ matrix.slug }}-${{ github.run_id }}
          base: ${{ github.ref_name }}
          title: "Regenerate policy: ${{ matrix.slug }}"
          body: |
            Automated regeneration triggered by a change to `${{ matrix.slug }}/prompt.md`.

            Structured `${{ matrix.slug }}/${{ matrix.slug }}.md` and narrative
            `${{ matrix.slug }}/${{ matrix.slug }}-narrative.md` were rebuilt from the
            current `prompt.md` + `references/` via the policy-prep pipeline and the
            meta-prompt / narrative skills.

            Review the diff before merging — these are regulator-facing compliance documents.
          delete-branch: true
